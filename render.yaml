services:
  - type: web
    name: ppl2026
    env: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self' https://*.firebasedatabase.app wss://*.firebasedatabase.app https://*.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:;"
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /firebase-messaging-sw.js
        name: Cache-Control
        value: no-cache
      - path: /firebase-messaging-sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /firebase-messaging-sw.js
        destination: /firebase-messaging-sw.js
      - type: rewrite
        source: /*
        destination: /index.html
